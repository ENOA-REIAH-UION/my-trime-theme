      long_click: '&'
      swipe_down: keyboard_edit
      swipe_up: '&'
    - click: h
      long_click: '-'
      swipe_up: '-'
    - click: j
      long_click: +
      swipe_down: liquid_keyboard_clipboard
      swipe_up: +
    - click: k
      long_click: (
      swipe_down: liquid_keyboard_emoji
      swipe_up: (
    - click: l
      long_click: )
      swipe_down: '{hint_switch}{symbol_switch}'
      swipe_up: )
    - width: 5
    - click: shift_L
      composing: escape
      double_click: shift_L2
      hilited_key_back_color: background_enter
      label_symbol: ' '
      long_click: shift_L
      swipe_down: menu
      width: 15
    - click: z
      long_click: '*'
      swipe_up: '*'
    - click: x
      long_click: '"'
      swipe_down: cut
      swipe_up: '"'
    - click: c
      long_click: ''''
      swipe_down: copy
      swipe_up: ''''
    - click: v
      long_click: $
      swipe_down: paste
      swipe_up: $
    - click: b
      long_click: ':'
      swipe_up: ':'
    - click: n
      long_click: '!'
      swipe_down: |2+

      swipe_up: '!'
