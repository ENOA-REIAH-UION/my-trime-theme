preset_keys:
  ascii_mode_switch:
    functional: false
    send: Mode_switch
    states:
    - ic@web
    - ic@web
    toggle: ascii_mode
  back_space:
    functional: true
    label: ⌫
    repeatable: true
    send: BackSpace
  back_space_2:
    functional: true
    label: Rol
    preview: ⌫
    repeatable: true
    send: BackSpace
  candidate_1:
    command: select_candidate
    label: U
    option: '1'
    send: function
  candidate_2:
    command: select_candidate
    label: Su
    option: '2'
    send: function
  candidate_3:
    command: select_candidate
    label: Yun
    option: '3'
    send: function
  candidate_4:
    command: select_candidate
    label: Fi
    option: '4'
    send: function
  clear_all:
    label: ⇤
    text: '{Control+End}{Control+Shift+Home}{Delete}'
  color_switch:
    functional: false
    label: 配色
    send: PROG_RED
  comma:
    functional: true
    label: ','
    send: ','
  copy:
    functional: false
    label: 复制
    send: Control+c
  ctrl_left:
    functional: false
    label: ⇦
    repeatable: true
    send: Control+Left
  ctrl_right:
    functional: false
    label: ⇨
    repeatable: true
    send: Control+Right
  cut:
    functional: false
    label: 剪切
    send: Control+x
  date:
    command: date
    label: 日期
    option: yyyy-MM-dd
    send: function
  delete_line:
    functional: false
    label: Del↔
    text: '{End}{Shift+Home}{Delete}'
  down:
    functional: false
    label: ↓
    repeatable: true
    send: Down
  end:
    functional: false
    label: 行尾
    send: End
  escape:
    functional: false
    label: Esc
    send: Escape
  hide:
    functional: false
    label: 隐藏
    send: BACK
  hint_switch:
    send: Mode_switch
    states:
    - ≑
    - ≟
    toggle: _hide_key_hint
  home:
    functional: false
    label: 行首
    send: Home
  keyboard_default:
    functional: true
    label: 返回
    select: default
    send: Eisu_toggle
  keyboard_edit:
    functional: false
    label: edit
    select: edit
    send: Eisu_toggle
  keyboard_number:
    functional: true
    label: ?123
    select: number
    send: Eisu_toggle
  left:
    functional: false
    label: ←
    repeatable: true
    send: Left
  liquid_back_space:
    functional: true
    label: ⌫
    repeatable: true
    send: BackSpace
  liquid_keyboard_ascii:
    command: liquid_keyboard
    functional: true
    label: 符号
    option: 英文
    send: function
  liquid_keyboard_clipboard:
    command: liquid_keyboard
    label: 剪贴
    option: 剪贴
    send: function
  liquid_keyboard_emoji:
    command: liquid_keyboard
    label: 🙂
