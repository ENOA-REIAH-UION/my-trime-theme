tool_bar:
  button_spacing: 13
  button_font: iconfont.ttf

  primary_button:
    foreground:
      style: "hanamaru/yuki.png"
      padding: 8
    action: menu_keyboard

  hide_button: &hide_button
    foreground:
      style: "ic@keyboard_close"
    action: hide

  emoji_button: &emoji_button
    foreground:
      style: "ic@emoticon_cry_outline"
    action: liquid_keyboard_emoji

  clipboard_button: &clipboard_button
    foreground:
      style: "ic@clipboard_text_outline"
    action: liquid_keyboard_clipboard

  edit_button: &edit_button
    foreground:
      style: "ic@cursor_move"
    action: keyboard_edit

  redo_button: &redo_button
    foreground:
      style: "ic@redo"
    action: redo

  undo_button: &undo_button
    foreground:
      style: "ic@undo"
    action: undo

  right_button: &right_button
    foreground:
      style: "ic@arrow-right"
      padding: 14
    action: right

  left_button: &left_button
    foreground:
      style: "ic@arrow-left"
      padding: 14
    action: left

  buttons: [*emoji_button, *edit_button, *clipboard_button, *redo_button, *undo_button, *right_button, *left_button]

